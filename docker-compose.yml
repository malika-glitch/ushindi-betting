version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ushindi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-ushindi_betting}
      MYSQL_USER: ${DB_USER:-betting_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - ushindi-network

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ushindi-backend
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: ${DB_USER:-betting_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-ushindi_betting}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ushindi-network
    command: npm run dev

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ushindi-frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ushindi-network
    command: npm start

volumes:
  mysql_data:

networks:
  ushindi-network:
    driver: bridge
